<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>jmnote</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
  <meta name="description" content="jmnote's github pages">
  
  <link rel="icon" href="https://github.com/jmnote.png" type="image/png">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
    title="docsify-darklight-theme" type="text/css" />
</head>

<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      auto2top: true,
      hideSidebar: true,
      loadSidebar: false,
      loadNavbar: false,
      maxLevel: 0,
      repo: 'https://github.com/jmnote/jmnote.github.io',
      search: false,
      darklightTheme: {
        defaultTheme: 'dark'
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>

</html>
